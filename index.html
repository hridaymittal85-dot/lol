<!DOCTTYPE html>
<html>
    <head>
        <title>time in USA</title>
        <style>
            title {
  color: red;
  font-size: 20px;
} 
h1 {
  color: darkseagreen;
  font-size: 15px;
}
button {
  color: azure;
}
body {
  background-color: aqua;
}
        </style>
    </head>
    <body>
        <h1>
            time in USA
        </h1>
        <button id="USA">NYC time</button>
        <p id="time">button not clicked</p>
        <button id="spain">Spain time</button>
        <p id="time1">button 1 not clicked</p>
        <script>
            // Target the HTML elements
const button = document.getElementById('USA');
const timeDisplay = document.getElementById('time');
let intervalId = null;

// Function to fetch and format live NYC time
function showNYCTime() {
    const now = new Date();
    
    const options = {
        timeZone: 'America/New_York',
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit',
        hour12: true
    };

    const formatter = new Intl.DateTimeFormat('en-US', options);
    timeDisplay.textContent = formatter.format(now);
}

// Listen for the click event to start the live clock
button.addEventListener('click', function() {
    // Clear any existing timer to prevent bugs
    if (intervalId) {
        clearInterval(intervalId);
    }
    
    // Show the time immediately on click
    showNYCTime();
    
    // Keep updating the time every second live
    intervalId = setInterval(showNYCTime, 1000);
});
            const button = document.getElementById('spain');
const timeDisplay = document.getElementById('time1');
let intervalId = null;

// Function to fetch and format live NYC time
function showSPAINTime() {
    const now = new Date();
    
    const options = {
        timeZone: 'Europe/Madrid',
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit',
        hour12: true
    };

    const formatter = new Intl.DateTimeFormat('en-US', options);
    timeDisplay.textContent = formatter.format(now);
}

// Listen for the click event to start the live clock
button.addEventListener('click', function() {
    // Clear any existing timer to prevent bugs
    if (intervalId) {
        clearInterval(intervalId);
    }
    
    // Show the time immediately on click
    showSPAINTime();
    
    // Keep updating the time every second live
    intervalId = setInterval(showSPAINTime, 1000);
});

        </script>
    </body>
</html>
